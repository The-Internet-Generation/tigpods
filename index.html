<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TigPods · Chennai Podcast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --bg: #0a0a0a;
  --bg-elev: #161616;
  --bg-card: #1a1a1a;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.18);
  --fg: #f5f5f5;
  --fg-muted: rgba(245,245,245,0.62);
  --fg-dim: rgba(245,245,245,0.38);
  --green: #1DB954;
  --green-dim: rgba(29,185,84,0.18);
  --display: "Bricolage Grotesque", "Space Grotesk", system-ui, sans-serif;
  --body: "Space Grotesk", system-ui, sans-serif;
}

/* ============================================================
   BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: #06060a;
  color: var(--fg);
  font-family: var(--body);
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
button, a {
  font: inherit;
  background: none;
  border: none;
  color: inherit;
  cursor: pointer;
  padding: 0;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

/* ============================================================
   STAGE + PHONE FRAME — always full-viewport, no phone chrome
   ============================================================ */
.stage {
  width: 100vw;
  height: 100dvh;
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  padding: 0;
  background: var(--bg);
}
.phone {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.phone-screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  position: relative;
  isolation: isolate;
}
.phone-notch { display: none; }

/* ============================================================
   STATUS BAR
   ============================================================ */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px 0;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--display);
  letter-spacing: 0.3px;
  z-index: 50;
  pointer-events: none;
  color: #fff;
}

/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  padding-top: 50px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  font-size: 11px;
  font-weight: 500;
  color: var(--fg);
  white-space: nowrap;
  font-family: var(--body);
  border: 1px solid var(--line);
}
.pill.green {
  color: var(--green);
  background: var(--green-dim);
  border-color: rgba(29,185,84,0.35);
}
.pill.solid-green {
  background: var(--green);
  color: #000;
  font-weight: 600;
  border-color: var(--green);
}
.icon-btn {
  width: 44px; height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  color: var(--fg);
}
.back-btn {
  position: absolute;
  top: 56px; left: 12px;
  width: 40px; height: 40px;
  border-radius: 999px;
  background: rgba(20,20,20,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 30;
  color: var(--fg);
}
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { scrollbar-width: none; }
.clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.hrow {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x proximity;
  scroll-padding-left: 16px;
  padding-left: 16px;
  padding-right: 16px;
}
.hrow > * { flex-shrink: 0; scroll-snap-align: start; }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes screenIn {
  from { transform: translateY(12px); opacity: 0.92; }
  to   { transform: translateY(0);    opacity: 1; }
}
.screen-enter { animation: screenIn 280ms ease-out both; }

@keyframes nudgeUp {
  0%, 100% { transform: translateY(0); opacity: 0.65; }
  50%       { transform: translateY(-4px); opacity: 1; }
}
.nudge { animation: nudgeUp 1.6s ease-in-out infinite; }

@keyframes popUp {
  from { transform: translateX(-50%) translateY(8px) scale(0.96); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}
@keyframes popDown {
  to { transform: translateX(-50%) translateY(8px) scale(0.96); opacity: 0; }
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ============================================================
   WELCOME SCREEN
   ============================================================ */
.welcome-popup {
  position: absolute;
  top: 78px; left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--line-2);
  padding: 10px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  color: var(--fg);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: popUp 400ms ease-out 200ms both;
  white-space: nowrap;
  pointer-events: auto;
}
.welcome-popup .pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.6s ease-in-out infinite;
  flex-shrink: 0;
}
.welcome-popup.dismissed { animation: popDown 240ms ease-in forwards; }

/* ============================================================
   WELCOME — HINT CHIPS
   ============================================================ */
@keyframes nudgeRight {
  0%, 100% { transform: translateX(0); opacity: 0.65; }
  50%       { transform: translateX(4px); opacity: 1; }
}
.nudge-right { animation: nudgeRight 1.6s ease-in-out infinite; display: inline-flex; }

@keyframes discRipple {
  0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
  100% { transform: translate(-50%,-50%) scale(1.9); opacity: 0; }
}
.disc-ripple {
  position: absolute; top: 50%; left: 50%;
  width: 92px; height: 92px;
  border-radius: 50%;
  border: 2px solid var(--green);
  pointer-events: none;
  animation: discRipple 1.6s ease-out infinite;
  z-index: 9;
}

.hint-chip {
  position: absolute;
  z-index: 12;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: rgba(20,20,20,0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  color: var(--fg);
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
}
.hint-chip-arrow {
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--green-dim);
  color: var(--green);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.hint-chip-up {
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  border-color: rgba(29,185,84,0.45);
  box-shadow: 0 6px 18px rgba(0,0,0,0.45), 0 0 18px rgba(29,185,84,0.14);
}
.hint-chip-right {
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  font-size: 10.5px;
  padding: 6px 8px 6px 10px;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}
.hint-chip-right .hint-chip-arrow { writing-mode: horizontal-tb; }

/* ============================================================
   WELCOME — NOW-PLAYING CHIP
   ============================================================ */
.nowplaying {
  width: 100%; max-width: 340px;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 8px 12px;
  background: rgba(20,20,20,0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  border-radius: 12px;
}
.nowplaying-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px rgba(29,185,84,0.7);
  flex-shrink: 0;
  animation: blink 1.6s ease-in-out infinite;
}
.nowplaying-meta {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 2px;
}
.nowplaying-label {
  font-size: 10px; letter-spacing: 0.04em;
  text-transform: uppercase; line-height: 1;
}
.nowplaying-title {
  font-size: 12px; line-height: 1.25;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--fg);
}
.nowplaying-yt {
  flex-shrink: 0; display: inline-flex;
  align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--line);
  color: var(--fg); text-decoration: none;
  transition: background 200ms ease;
}
.nowplaying-yt:hover { background: rgba(255,255,255,0.12); }

/* ============================================================
   REEL SCREEN
   ============================================================ */
.reel-feed {
  position: absolute;
  inset: 0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}
.reel-feed::-webkit-scrollbar { display: none; }
.reel-card {
  scroll-snap-align: start;
  width: 100%; height: 100%;
  position: relative;
  overflow: hidden;
}
.thumb-bg   { background: linear-gradient(135deg, rgba(29,185,84,0.18), rgba(29,185,84,0.04) 60%, rgba(255,255,255,0.04)), #1a1a1a; }
.thumb-bg-2 { background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 60%, rgba(29,185,84,0.08)), #1a1a1a; }
.thumb-bg-3 { background: linear-gradient(135deg, rgba(255,200,100,0.12), rgba(29,185,84,0.06) 60%, rgba(255,255,255,0.04)), #1a1a1a; }
.thumb-bg-4 { background: linear-gradient(135deg, rgba(150,100,255,0.18), rgba(29,185,84,0.06) 60%, rgba(255,255,255,0.04)), #1a1a1a; }

/* ============================================================
   LIBRARY SCREEN
   ============================================================ */
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--fg);
  font-family: var(--body);
  font-size: 15px;
  padding: 12px 14px 12px 42px;
  border-radius: 14px;
  outline: none;
  transition: border-color 200ms;
}
.search-input::placeholder { color: var(--fg-dim); }
.search-input:focus { border-color: var(--green); }

/* Episode grid: 2 cols on mobile, 3 on desktop */
.episode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (min-width: 769px) {
  .episode-grid { grid-template-columns: 1fr 1fr 1fr; }
}

/* Spotify mini-player */
.sp-player {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  transform: translateY(100%);
  transition: transform 420ms cubic-bezier(0.16,1,0.3,1);
}
.sp-player.visible { transform: translateY(0); }

/* ============================================================
   WIKI SCREEN
   ============================================================ */
.bw-fade {
  filter: grayscale(1) contrast(1.05) brightness(0.85);
  mask-image: linear-gradient(180deg, #000 35%, rgba(0,0,0,0.85) 60%, transparent 100%);
  -webkit-mask-image: linear-gradient(180deg, #000 35%, rgba(0,0,0,0.85) 60%, transparent 100%);
}
</style>
</head>

<script>
'use strict';

/* ============================================================
   SUPABASE
   ============================================================ */
const SB_URL = 'https://gdhpohaopwcsvqyxjvfw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkaHBvaGFvcHdjc3ZxeXhqdmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzQ3MDksImV4cCI6MjA5NTQ1MDcwOX0.tRf1FrjM7BCZO-x_qjsWZQjBBVdl_nSKNqoIOC-TGZc';
const SB_HEADERS = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` };

/* Live data — populated by loadData() before first render */
let EPISODES   = [];
let WIKI_DATA  = {};
let SHORTS_SEED = [];

async function loadData() {
  const [eps, shorts] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/tigpods_episodes?select=*&order=no`, { headers: SB_HEADERS }).then(r => r.json()),
    fetch(`${SB_URL}/rest/v1/tigpods_shorts?select=*&order=episode_no,sort_order`, { headers: SB_HEADERS }).then(r => r.json()),
  ]);

  EPISODES = eps;

  eps.forEach(ep => {
    const epShorts = shorts.filter(s => s.episode_no === ep.no);
    if (ep.topics?.length || ep.quote || epShorts.length) {
      WIKI_DATA[ep.no] = {
        topics: ep.topics || [],
        quote:  ep.quote  || '',
        shorts: epShorts.map(s => ({ title: s.title, dur: s.duration || '', youtube_url: s.youtube_url || null, instagram_url: s.instagram_url || null })),
      };
    }
  });

  /* Build reel shorts pool from DB shorts (with title as clip title) */
  if (shorts.length > 0) {
    SHORTS_SEED = shorts.map(s => ({ ep: s.episode_no, clipTitle: s.title, youtube_url: s.youtube_url || null, instagram_url: s.instagram_url || null }));
  } else {
    /* Fallback if DB has no shorts yet */
    SHORTS_SEED = [
      { ep: 10, clipTitle: "Ungomma, engomma, ungakka..." },
      { ep: 10, clipTitle: "Dating 101 in Chennai" },
      { ep: 16, clipTitle: "Imposter syndrome after Bigg Boss" },
      { ep: 16, clipTitle: "Why most lyricists burn out" },
      { ep: 14, clipTitle: "Spot editing in Petta" },
      { ep: 14, clipTitle: "Editor paribandangal" },
      { ep: 14, clipTitle: "The clapboard is useless?!" },
      { ep: 14, clipTitle: "Working with Thalaivar" },
      { ep: 12, clipTitle: "RJ-ka epovume pesite irrupanga" },
      { ep: 12, clipTitle: "Reading the silence on radio" },
      { ep: 17, clipTitle: "How I got viral by accident" },
      { ep: 17, clipTitle: "The reel-to-stage transition" },
      { ep: 4,  clipTitle: "Attention spans, gone" },
      { ep: 6,  clipTitle: "Inside the songwriter's process" },
      { ep: 15, clipTitle: "What makes an ad land" },
      { ep: 19, clipTitle: "Deconstructing a punchline" },
    ];
  }
}

/* ============================================================
   UTILITIES
   ============================================================ */
function initials(name) {
  return name.trim().split(/\s+/).slice(0, 2).map(s => s[0]).join('').toUpperCase();
}

function thumbBg(no) {
  return ['thumb-bg','thumb-bg-2','thumb-bg-3','thumb-bg-4'][no % 4];
}

function defaultWiki(ep) {
  const art = /^[aeiou]/i.test(ep.cat) ? 'n' : '';
  return {
    topics: [
      `Origins · how ${ep.guest.split(' ')[0]} got started`,
      `The craft of being a${art} ${ep.cat.toLowerCase()}`,
      "Working in Chennai's creative scene",
      "What's next",
    ],
    quote: "This conversation hasn't been transcribed yet — drop us the highlight reel and we'll pull the pull-quote.",
    shorts: [
      { title: "Highlight clip 1", dur: "0:55" },
      { title: "Highlight clip 2", dur: "1:04" },
      { title: "Highlight clip 3", dur: "0:48" },
    ],
  };
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Extract YouTube video ID from any YT URL format */
function ytVideoId(url) {
  if (!url) return null;
  let m;
  m = url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  m = url.match(/\/shorts\/([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  m = url.match(/\/embed\/([A-Za-z0-9_-]{11})/);
  if (m) return m[1];
  return null;
}

/* Compute best available thumbnail for an episode */
function epThumb(ep) {
  if (ep.thumbnail_url) return ep.thumbnail_url;
  const vid = ytVideoId(ep.youtube_url);
  return vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : null;
}

/* Extract Spotify episode ID from episode URL */
function spotifyEpId(url) {
  if (!url) return null;
  const m = url.match(/episode\/([A-Za-z0-9]+)/);
  return m ? m[1] : null;
}

function buildShortsPool() {
  const all = SHORTS_SEED.map((s, i) => ({
    id: i,
    ep: EPISODES.find(e => e.no === s.ep),
    clipTitle: s.clipTitle,
    clipYtUrl: s.youtube_url || null,
  }));
  /* Only include clips that have an embeddable YouTube video URL.
     This prevents blank reel cards from dominating the feed. */
  const withVideo = all.filter(item => item.ep && item.clipYtUrl && ytVideoId(item.clipYtUrl));
  return withVideo.length >= 2 ? withVideo : all;
}

/* Tags for library filtering */
function tagsFor(ep) {
  const t = [];
  const c = (ep.cat || '').toLowerCase();
  const g = (ep.guest || '').toLowerCase();
  const ti = (ep.title || '').toLowerCase();
  if (c.includes('editor'))                            t.push('Editing', 'Tamil cinema');
  if (c.includes('art director') || c.includes('costume')) t.push('Tamil cinema', 'Filmmaking');
  if (c.includes('actor') || c.includes('lyricist'))  t.push('Acting', 'Tamil cinema');
  if (c.includes('singer') || c.includes('musician')) t.push('Music');
  if (c.includes('rj'))                               t.push('Radio', 'Storytelling');
  if (c.includes('comedian'))                         t.push('Comedy', 'Content creation');
  if (c.includes('content'))                          t.push('Content creation');
  if (c.includes('creative director'))                t.push('Advertising');
  if (c.includes('engineer') || c.includes('google')) t.push('Tech');
  if (c.includes('metaverse'))                        t.push('Tech');
  if (c.includes('tattoo'))                           t.push('Art');
  if (c.includes('agency'))                           t.push('Business', 'Chennai');
  if (c.includes('entrepreneur'))                     t.push('Business');
  if (c.includes('distiller'))                        t.push('Business');
  if (c.includes('screenwriter') || c.includes('writer')) t.push('Tamil cinema', 'Writing');
  if (ti.includes('bigg boss'))                       t.push('Bigg Boss');
  if (g.includes('vikkals') || ti.includes('viral'))  t.push('Comedy');
  return [...new Set(t)];
}

const SUGGESTED_TAGS = ['Tamil cinema','Comedy','Content creation','Bigg Boss','Editing','Music','Tech','Business','Acting','Radio'];
const BUSINESS_TAGS  = ['Business', 'Advertising', 'Tech'];
const CREATIVE_TAGS  = ['Tamil cinema', 'Music', 'Comedy', 'Acting', 'Editing', 'Content creation', 'Art', 'Radio', 'Writing', 'Filmmaking', 'Storytelling'];

/* ============================================================
   SVG ICONS
   ============================================================ */
const Icons = {
  speakerOn: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v6h3l5 4V5L8 9H5z"/><path d="M16 8a5 5 0 0 1 0 8" opacity="0.9"/><path d="M18.5 5.5a8.5 8.5 0 0 1 0 13" opacity="0.55"/></svg>`,
  speakerOff: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v6h3l5 4V5L8 9H5z"/><path d="M16 9l5 6M21 9l-5 6"/></svg>`,
  arrowUp: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`,
  arrowRight: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`,
  arrowLeft: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>`,
  search: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>`,

/* ============================================================
   ROUTER
   ============================================================ */
let currentCleanup = null;
let navGen = 0;            // bumped per navigation; stale rAF/timer callbacks bail out
let pendingNavTimer = null; // single cancellable timer that finalizes the last transition
const root = document.getElementById('screen-root');

function navigate(screenFn, params = {}, dir = 'instant') {
  const gen = ++navGen;

  /* Finalize any in-flight transition before starting a new one:
     drop every screen except the most recent and snap it back to a clean,
     centered state. Removing from the FRONT keeps the current screen (last
     child) — removing from the back would animate from a stale screen. */
  if (pendingNavTimer) { clearTimeout(pendingNavTimer); pendingNavTimer = null; }
  while (root.children.length > 1) root.firstElementChild.remove();
  const settled = root.firstElementChild;
  if (settled) {
    settled.style.transition = 'none';
    settled.style.transform  = '';
    settled.style.opacity     = '';
  }

  const prevEl = root.firstElementChild;
  const prevCleanup = currentCleanup;
  if (prevCleanup) { prevCleanup(); currentCleanup = null; }

  const { el, cleanup } = screenFn(params);
  currentCleanup = cleanup || null;

  const TXS = {
    up:    { enter: 'translateY(100%)',   exit: 'translateY(-18%) scale(0.96)' },
    down:  { enter: 'translateY(-100%)',  exit: 'translateY(18%) scale(0.96)' },
    right: { enter: 'translateX(100%)',   exit: 'translateX(-18%) scale(0.96)' },
    left:  { enter: 'translateX(-100%)',  exit: 'translateX(18%) scale(0.96)' },
  };
  const tx = TXS[dir];

  if (!prevEl || !tx) {
    root.innerHTML = '';
    root.appendChild(el);
    return;
  }

  /* Suppress the screenIn CSS animation — we handle the enter ourselves */
  el.classList.remove('screen-enter');
  el.style.animation = 'none';

  /* Place new screen off-screen with no transition */
  el.style.transform = tx.enter;
  el.style.transition = 'none';
  root.appendChild(el);

  /* Double rAF → browser commits initial layout before starting transitions */
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (gen !== navGen) return; /* superseded by a newer navigation — do nothing */
    const dur = '400ms cubic-bezier(0.22, 1, 0.36, 1)';

    /* Slide new screen in */
    el.style.transition = `transform ${dur}`;
    el.style.transform  = 'none';

    /* Slide old screen out */
    prevEl.style.transition = `transform ${dur}, opacity 380ms ease`;
    prevEl.style.transform  = tx.exit;
    prevEl.style.opacity    = '0';

    /* Single cancellable timer settles the transition — no lingering
       transitionend listeners that could clear transforms mid-animation. */
    pendingNavTimer = setTimeout(() => {
      pendingNavTimer = null;
      if (gen !== navGen) return;
      if (prevEl.parentNode) prevEl.remove();
      el.style.transition = '';
      el.style.transform  = '';
    }, 440);
  }));
}

/* ============================================================
   SWIPE — shared gesture helper
   Attaches to a screen element and fires direction callbacks on flick.
   Returns a teardown fn. Only the dominant axis fires; small drags are
   ignored so it never competes with taps or vertical scroll-snap.
   ============================================================ */
function attachSwipe(target, handlers = {}) {
  const threshold = 48;
  let sx = 0, sy = 0, st = 0, tracking = false;
  function onStart(e) {
    if (e.touches.length !== 1) { tracking = false; return; }
    /* Don't hijack swipes that begin inside a horizontal scroller (chip rows,
       shorts rows) — those gestures belong to that row's own scrolling. */
    const hScroll = e.target.closest && e.target.closest('.hrow');
    if (hScroll && hScroll.scrollWidth > hScroll.clientWidth + 4) { tracking = false; return; }
    sx = e.touches[0].clientX; sy = e.touches[0].clientY; st = Date.now();
    tracking = true;
  }
  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    const dt = Date.now() - st;
    if (dt > 800) return; // too slow to be a flick
    if (adx > ady * 1.15 && adx > threshold) {
      (dx < 0 ? handlers.onLeft : handlers.onRight)?.();
    } else if (ady > adx * 1.15 && ady > threshold) {
      (dy < 0 ? handlers.onUp : handlers.onDown)?.();
    }
  }
  target.addEventListener('touchstart', onStart, { passive: true });
  target.addEventListener('touchend', onEnd, { passive: true });
  return () => {
    target.removeEventListener('touchstart', onStart);
    target.removeEventListener('touchend', onEnd);
  };
}

/* ============================================================
   SHARE — native share sheet with graceful fallbacks
   ============================================================ */
function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:9999;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;border:1px solid rgba(255,255,255,0.18);opacity:0;transition:opacity 180ms ease;pointer-events:none;';
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 220); }, 1600);
}

async function shareContent({ title, text, url }) {
  if (!url) { toast('Nothing to share'); return; }
  /* Native share sheet (mobile) — exposes WhatsApp, Instagram, X, etc. */
  if (navigator.share) {
    try { await navigator.share({ title, text, url }); return; }
    catch (e) { if (e && e.name === 'AbortError') return; } // user dismissed
  }
  /* Desktop / unsupported — copy the link */
  try {
    await navigator.clipboard.writeText(url);
    toast('Link copied to clipboard');
  } catch (e) {
    window.open(url, '_blank', 'noopener');
  }
}

  centerBtn.addEventListener('mouseleave', () => { if (playing) centerOverlay.style.opacity = '0'; });
  turntable.appendChild(centerBtn);

  hero.appendChild(turntable);

  /* Now-playing chip + brand tagline */
  const bottomGroup = document.createElement('div');
  bottomGroup.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;padding:0 20px;';

  if (currentEp) {
    const chip = document.createElement('div');
    chip.className = 'nowplaying';
    chip.innerHTML = `
      <span class="nowplaying-dot"></span>
      <div class="nowplaying-meta">
        <div class="nowplaying-label">
          <span style="color:var(--green);font-weight:600;">Now playing</span>
          <span style="color:var(--fg-dim);"> · Ep ${currentEp.no}</span>
        </div>
        <div class="nowplaying-title">
          <span style="font-weight:600;">${currentEp.guest}</span>
          <span style="color:var(--fg-muted);"> — ${currentEp.title}</span>
        </div>
      </div>
      <a href="${ytUrl}" target="_blank" rel="noopener noreferrer" class="nowplaying-yt" aria-label="Watch on YouTube">${Icons.youtube}</a>
    `;
    bottomGroup.appendChild(chip);
  }

  const tagline = document.createElement('div');
  tagline.textContent = 'a podcast from chennai · by jaytesh calpakkam';
  tagline.style.cssText = 'text-align:center;color:var(--fg-dim);font-size:11px;letter-spacing:0.05em;';
  bottomGroup.appendChild(tagline);
  hero.appendChild(bottomGroup);
  el.appendChild(hero);

  /* Hint chip — right edge (library) */
  const hintRight = document.createElement('button');
  hintRight.className = 'hint-chip hint-chip-right';
  hintRight.setAttribute('aria-label', 'Flick right for full library');
  hintRight.innerHTML = `<span class="hint-chip-arrow nudge-right">${Icons.arrowRight}</span><span>flick · library</span>`;
  el.appendChild(hintRight);

  /* Hint chip — bottom center (reel) */
  const hintUp = document.createElement('button');
  hintUp.className = 'hint-chip hint-chip-up';
  hintUp.setAttribute('aria-label', 'Flick up for a random episode');
  hintUp.innerHTML = `<span class="hint-chip-arrow nudge">${Icons.arrowUp}</span><span>flick up · random episode</span>`;
  el.appendChild(hintUp);

  /* ----- State + interactivity ----- */
  function computeArcPath(p) {
    const r = 122, cx = 130, cy = 130;
    const angle = p * Math.PI * 2 - Math.PI / 2;
    const endX = cx + r * Math.cos(angle);
    const endY = cy + r * Math.sin(angle);
    if (p >= 0.999) return `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r}`;
    return `M ${cx} ${cy - r} A ${r} ${r} 0 ${p > 0.5 ? 1 : 0} 1 ${endX} ${endY}`;
  }

  function updateArc(p) {
    const r = 122, cx = 130, cy = 130;
    const angle = p * Math.PI * 2 - Math.PI / 2;
    arcPath.setAttribute('d', computeArcPath(p));
    arcDot.setAttribute('cx', String(cx + r * Math.cos(angle)));
    arcDot.setAttribute('cy', String(cy + r * Math.sin(angle)));
  }

  /* Visual state only — never triggers playback. Playback is driven by the
     native <audio> events (or the Spotify fallback), which then call this. */
  function applyVisuals(val) {
    playing = val;
    disc.style.animationPlayState = playing ? 'running' : 'paused';
    arm.style.transform = `translateY(-50%) rotate(${playing ? 110 : 75}deg)`;
    arcSvg.style.opacity = playing ? '1' : '0';
    glow.style.opacity = playing ? '1' : '0.55';
    if (!playing) startTime = null;
    centerBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    centerOverlay.innerHTML = playing ? pauseIcon : playIcon;
    centerOverlay.style.opacity = playing ? '0' : '1';
  }

  /* RAF loop for progress arc — real audio time when available, else synthetic */
  function loop(t) {
    if (playing) {
      if (audioEl && audioEl.duration && isFinite(audioEl.duration)) {
        progress = audioEl.currentTime / audioEl.duration;
      } else {
        if (!startTime) startTime = t - 22000; // 22s headstart so arc is already visible
        progress = ((t - startTime) / 1000 % 90) / 90;
      }
      updateArc(progress);
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);

  /* Spotify mini-player container — only used as a fallback when audio_url is missing */
  const spPlayer = document.createElement('div');
  spPlayer.className = 'sp-player';
  el.appendChild(spPlayer);

  if (audioUrl) {
    /* PRIMARY PATH — native <audio>. A direct MP3 played from inside the disc-tap
       gesture autoplays reliably on iOS Safari / Brave, unlike a cross-origin iframe. */
    audioEl = document.createElement('audio');
    audioEl.src = audioUrl;
    /* 'metadata' lets us learn the duration up front and seek to a random
       middle slice before the user ever taps, so playback drops them into the
       conversation rather than the intro. */
    audioEl.preload = 'metadata';
    audioEl.setAttribute('playsinline', '');
    audioEl.style.display = 'none';
    el.appendChild(audioEl);
    /* Start at a random point in the middle third-ish (28%–62%) of the episode. */
    let seekedToMiddle = false;
    audioEl.addEventListener('loadedmetadata', () => {
      if (seekedToMiddle) return;
      const d = audioEl.duration;
      if (isFinite(d) && d > 0) {
        audioEl.currentTime = d * (0.28 + Math.random() * 0.34);
        seekedToMiddle = true;
      }
    });
    /* Visuals follow the element's real state, so a rejected play() never desyncs the UI */
    audioEl.addEventListener('play',  () => applyVisuals(true));
    audioEl.addEventListener('pause', () => applyVisuals(false));
    audioEl.addEventListener('ended', () => { audioEl.currentTime = 0; applyVisuals(false); });
  } else if (epSpId) {
    /* FALLBACK — Spotify embed for episodes that have no audio_url yet (newest uploads).
       Loaded with autoplay=1 inside the tap gesture; iOS/Brave show one-tap play. */
    spIframe = document.createElement('iframe');
    spIframe.style.cssText = 'width:100%;height:152px;border:none;display:block;';
    spIframe.setAttribute('allow', 'autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture');
    spIframe.src = `https://open.spotify.com/embed/episode/${epSpId}?utm_source=generator&theme=0&autoplay=0`;
    spPlayer.appendChild(spIframe);
  }

  /* Init: show paused state */
  applyVisuals(false);

  /* Disc center tap — play/pause. */
  centerBtn.addEventListener('click', () => {
    if (!audioUnlocked) {
      /* Kill the prompt ripple — user found the button */
      discRipple.style.animation = 'none';
      discRipple.style.opacity = '0';
      audioUnlocked = true;
    }
    if (audioEl) {
      /* Called synchronously in the gesture stack → iOS permits autoplay */
      if (audioEl.paused) audioEl.play().catch(() => {});
      else audioEl.pause();
    } else if (epSpId && spIframe) {
      if (!spVisible) {
        spIframe.src = `https://open.spotify.com/embed/episode/${epSpId}?utm_source=generator&theme=0&autoplay=1`;
        spPlayer.classList.add('visible');
        spVisible = true;
        applyVisuals(true);
      } else {
        const next = !playing;
        if (spIframe.contentWindow) spIframe.contentWindow.postMessage({ command: next ? 'play' : 'pause' }, '*');
        applyVisuals(next);
      }
    } else {
      applyVisuals(!playing);
    }
  });

  /* Gesture handling — flick up for a random episode, flick sideways for library */
  const detachSwipe = attachSwipe(el, {
    onUp:    () => navigate(Reel, {}, 'up'),
    onLeft:  () => navigate(Library, {}, 'right'),
    onRight: () => navigate(Library, {}, 'right'),
  });
  el.addEventListener('wheel', e => {
    if (e.deltaY > 20) navigate(Reel, {}, 'up');
  }, { passive: true });

  hintUp.addEventListener('click', () => navigate(Reel, {}, 'up'));
  hintRight.addEventListener('click', () => navigate(Library, {}, 'right'));

  /* Cleanup */
  function cleanup() {
    cancelAnimationFrame(rafId);
    if (audioEl) { audioEl.pause(); audioEl.src = ''; } // stop playback + release buffer
    if (spIframe) spIframe.src = ''; // stop playback
    detachSwipe();
  }

  return { el, cleanup };
}

/* ============================================================
   SCREEN: REEL
   ============================================================ */
function Reel() {
  const pool = buildShortsPool();
  let items = shuffleArray(pool).slice(0, 20).map((p, i) => ({ ...p, id: i }));
  let activeIdx = 0;
  let idCounter = items.length;
  /* Session-wide sound choice. Clips ALWAYS autoplay muted (the only autoplay
     mobile allows); once the user unmutes, we keep sound on for every
     subsequent clip by un-muting via the YouTube JS API — no reload, so
     playback never stops. */
  let reelMuted = true;

  const el = document.createElement('div');
  el.className = 'screen screen-enter';
  el.style.padding = '0';

  el.appendChild(statusBarEl());
  el.appendChild(backBtnEl(() => navigate(Welcome, {}, 'down')));

  /* Snap-scroll feed */
  const feed = document.createElement('div');
  feed.className = 'reel-feed';
  el.appendChild(feed);

  /* Card registry for progress bar control */
  const cardRegistry = new Map(); // id -> { setActive }

  function createCard(item) {
    const { ep, clipTitle, id, clipYtUrl } = item;
    let paused = false;
    let ytIframe = null;
    const videoId = ytVideoId(clipYtUrl); // null if no URL

    const card = document.createElement('div');
    card.className = 'reel-card';

    /* Background: solid dark — YouTube video covers this when loaded */
    card.innerHTML = `
      <div style="position:absolute;inset:0;background:#0d0d0d;"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.92) 9%,rgba(0,0,0,0.35) 22%,rgba(0,0,0,0) 32%,rgba(0,0,0,0) 55%,rgba(0,0,0,0.88) 100%);pointer-events:none;z-index:3;"></div>
    `;

    /* Progress bar */
    const progressWrap = document.createElement('div');
    progressWrap.style.cssText = 'position:absolute;top:50px;left:14px;right:14px;height:3px;background:rgba(255,255,255,0.16);border-radius:2px;z-index:10;';
    const progressFill = document.createElement('div');
    progressFill.style.cssText = 'height:100%;width:0%;background:var(--green);border-radius:2px;box-shadow:0 0 6px rgba(29,185,84,0.5);';
    progressWrap.appendChild(progressFill);
    card.appendChild(progressWrap);

    /* Brand mini-mark */
    const brandMark = document.createElement('div');
    brandMark.style.cssText = 'position:absolute;top:64px;left:14px;z-index:10;';
    brandMark.appendChild(logoEl(22, false));
    card.appendChild(brandMark);


    /* YouTube JS-API helpers — toggle sound on the LIVE player (no reload, so
       the clip keeps playing). Posted repeatedly because the player may not be
       ready the instant we ask. */
    function postYT(func, args) {
      try {
        ytIframe && ytIframe.contentWindow &&
          ytIframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func, args: args || [] }), '*');
      } catch (e) {}
    }
    function applySound() {
      const cmds = reelMuted ? [['mute']] : [['unMute'], ['setVolume', [100]], ['playVideo']];
      [0, 250, 700, 1400].forEach(delay => setTimeout(() => cmds.forEach(([f, a]) => postYT(f, a)), delay));
    }

    /* Tap-to-pause overlay — full card, invisible */
    const tapOverlay = document.createElement('div');
    tapOverlay.style.cssText = 'position:absolute;inset:0;z-index:5;cursor:pointer;';
    const pauseIconEl = document.createElement('div');
    pauseIconEl.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;border:1px solid var(--line-2);color:#fff;';
    pauseIconEl.innerHTML = Icons.play;
    tapOverlay.appendChild(pauseIconEl);
    tapOverlay.addEventListener('click', () => {
      paused = !paused;
      pauseIconEl.style.display = paused ? 'flex' : 'none';
      if (!paused) restartProgress();
      else stopProgress();
    });
    card.appendChild(tapOverlay);

    /* Sound toggle — top-right corner. The clip is already playing (muted);
       tapping unmutes the LIVE player via the API (no reload) and the choice
       sticks for every clip after this one. */
    const unmuteBtn = document.createElement('button');
    unmuteBtn.style.cssText = 'position:absolute;top:64px;right:14px;z-index:15;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;';
    function syncMuteBtn() {
      unmuteBtn.innerHTML = reelMuted ? Icons.speakerOff : Icons.speakerOn;
      unmuteBtn.setAttribute('aria-label', reelMuted ? 'Unmute' : 'Mute');
    }
    syncMuteBtn();
    unmuteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      reelMuted = !reelMuted;  // session-wide
      syncMuteBtn();
      applySound();            // toggle live — no reload, video keeps playing
    });
    card.appendChild(unmuteBtn);

    /* Share button — below the mute toggle */
    const shareBtn = document.createElement('button');
    shareBtn.style.cssText = 'position:absolute;top:108px;right:14px;z-index:15;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;';
    shareBtn.setAttribute('aria-label', 'Share this clip');
    shareBtn.innerHTML = Icons.share;
    shareBtn.querySelector('svg')?.setAttribute('width', '18');
    shareBtn.querySelector('svg')?.setAttribute('height', '18');
    shareBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      shareContent({
        title: `TigPods — ${ep.guest}`,
        text: `${ep.guest} on TigPods${clipTitle ? ' — ' + clipTitle : ''}`,
        url: clipYtUrl,
      });
    });
    card.appendChild(shareBtn);

    /* Guest name — bottom left, tappable → episode detail */
    const guestBtn = document.createElement('button');
    guestBtn.style.cssText = 'position:absolute;bottom:32px;left:16px;right:16px;z-index:10;background:none;border:none;text-align:left;cursor:pointer;padding:0;';
    guestBtn.innerHTML = `
      <div style="font-family:var(--display);font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6);">${ep.guest}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:4px;letter-spacing:0.05em;display:flex;align-items:center;gap:4px;">Ep ${ep.no} · ${ep.cat} ${Icons.arrowRight}</div>
    `;
    guestBtn.addEventListener('click', (e) => { e.stopPropagation(); navigate(Wiki, { epNo: ep.no }, 'right'); });
    card.appendChild(guestBtn);

    /* Progress bar control */
    let progressTimer = null;
    function restartProgress() {
      progressFill.style.transition = 'none';
      progressFill.style.width = '0%';
      void progressFill.offsetWidth;
      progressFill.style.transition = 'width 24s linear';
      progressFill.style.width = '100%';
    }
    function stopProgress() {
      progressFill.style.transition = 'none';
    }

    let preloadIframe = null;

    cardRegistry.set(id, {
      /* Called when this card scrolls into the active slot */
      setActive(active) {
        if (active) {
          if (!paused) restartProgress();
          syncMuteBtn(); // reflect the session-wide sound choice on this card
          if (videoId && !ytIframe) {
            /* Always create a FRESH iframe whose first load IS the autoplay URL.
               Mutating a preloaded iframe's src does NOT autoplay (YouTube blocks
               autoplay after a navigation), which is why only card 0 played
               before. A clean iframe with autoplay=1&mute=1 plays every time.
               enablejsapi=1 lets us un-mute the live player without reloading. */
            if (preloadIframe) { preloadIframe.remove(); preloadIframe = null; }
            ytIframe = document.createElement('iframe');
            ytIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&enablejsapi=1&controls=0&rel=0&modestbranding=1&playsinline=1&loop=1&playlist=${videoId}`;
            ytIframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;';
            ytIframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
            ytIframe.setAttribute('allowfullscreen', '');
            /* Once the player loads, apply the current sound choice. If the user
               has unmuted, this carries the sound forward to every new clip. */
            ytIframe.addEventListener('load', applySound);
            card.insertBefore(ytIframe, card.children[1]);
          }
        } else {
          stopProgress();
          /* Remove active iframe to stop buffering */
          if (ytIframe) { ytIframe.remove(); ytIframe = null; }
        }
      },
      /* Called for the card right after the active one — silently buffers */
      preload() {
        if (videoId && !ytIframe && !preloadIframe) {
          preloadIframe = document.createElement('iframe');
          /* autoplay=0 — loads resources without playing audio/video */
          preloadIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&mute=1&controls=0&rel=0&modestbranding=1&playsinline=1`;
          preloadIframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;opacity:0;';
          preloadIframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
          card.insertBefore(preloadIframe, card.children[1]);
        }
      },
    });

    return card;
  }

  /* Render initial cards */
  items.forEach(item => feed.appendChild(createCard(item)));

  /* Activate first card */
  if (cardRegistry.has(items[0].id)) cardRegistry.get(items[0].id).setActive(true);

  /* Preload initial next card */
  if (items[1]) cardRegistry.get(items[1].id)?.preload?.();

  /* Switch the active card, clamping to a valid index */
  function setActiveIdx(idx) {
    idx = Math.max(0, Math.min(items.length - 1, idx));
    if (idx === activeIdx) return;
    cardRegistry.get(items[activeIdx]?.id)?.setActive(false);
    activeIdx = idx;
    cardRegistry.get(items[activeIdx]?.id)?.setActive(true);
    cardRegistry.get(items[activeIdx + 1]?.id)?.preload?.();
  }

  /* Scroll handler — switch on the fly, then re-sync once momentum settles so
     the playing card always matches the one the snap actually landed on. */
  let settleTimer = null;
  feed.addEventListener('scroll', () => {
    setActiveIdx(Math.round(feed.scrollTop / feed.clientHeight));

    clearTimeout(settleTimer);
    settleTimer = setTimeout(() => {
      setActiveIdx(Math.round(feed.scrollTop / feed.clientHeight));
    }, 120);

    /* Infinite append */
    if (feed.scrollTop + feed.clientHeight * 3 > feed.scrollHeight) {
      const more = shuffleArray(pool).slice(0, 10).map((p) => ({ ...p, id: idCounter++ }));
      more.forEach(item => {
        items.push(item);
        feed.appendChild(createCard(item));
      });
    }
  }, { passive: true });

  /* Keyboard */
  function onKey(e) { if (e.key === 'Escape') navigate(Welcome, {}, 'down'); }
  document.addEventListener('keydown', onKey);

  /* Horizontal swipe navigates; vertical stays with the feed's scroll-snap.
     Right → home, left → library. (The dominant-axis check in attachSwipe
     keeps vertical scrolling from ever triggering a screen change.) */
  const detachSwipe = attachSwipe(el, {
    onRight: () => navigate(Welcome, {}, 'left'),   // back to home
    onLeft:  () => navigate(Library, {}, 'right'),  // forward to library
    onDown:  () => { if (feed.scrollTop <= 2) navigate(Welcome, {}, 'down'); }, // pull down past the first reel
  });

  return {
    el,
    cleanup: () => {
      clearTimeout(settleTimer);
      document.removeEventListener('keydown', onKey);
      detachSwipe();
    },
  };
}

        <div style="color:var(--green);font-weight:600;font-size:14px;">${epsTagged.length}</div>
        <div>episodes</div>
      </div>

  `;

  /* Search */
  const searchWrap = document.createElement('div');

  searchIcon.style.cssText = 'position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-dim);pointer-events:none;display:flex;';
  searchIcon.innerHTML = Icons.search;

  clearBtn.setAttribute('aria-label', 'Clear');

  searchWrap.appendChild(searchInput);
  searchWrap.appendChild(clearBtn);
  header.appendChild(searchWrap);
  el.appendChild(header);

  /* ── Category tabs: Business | Creative ── */
  const catTabs = document.createElement('div');
  catTabs.style.cssText = 'padding:0 20px 10px;display:flex;gap:10px;flex-shrink:0;';

  function renderCatTabs() {
    catTabs.innerHTML = '';
    [['business', 'Business'], ['creative', 'Creative']].forEach(([key, label]) => {
      const isActive = activeCat === key;
      const btn = document.createElement('button');
      btn.style.cssText = [
        'flex:1;padding:13px 8px;border-radius:14px;',
        `font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-0.015em;`,
        'cursor:pointer;transition:background 180ms,border-color 180ms,color 180ms;',
        `border:1.5px solid ${isActive ? 'var(--green)' : 'var(--line-2)'};`,
        `background:${isActive ? 'var(--green-dim)' : 'transparent'};`,
        `color:${isActive ? 'var(--green)' : 'var(--fg-muted)'};`,
      ].join('');
      btn.textContent = label;
      btn.addEventListener('click', () => {
        activeCat = isActive ? null : key;
        if (!isActive) activeTag = null; // reset tag when switching category
        renderCatTabs();
        renderChips();
        renderGrid();
      });
      catTabs.appendChild(btn);
    });
  }
  el.appendChild(catTabs);

  /* Topic chips */
  const chipsRow = document.createElement('div');
  chipsRow.className = 'hrow no-scrollbar';
  chipsRow.style.cssText = 'padding-top:2px;padding-bottom:12px;flex-shrink:0;';
  el.appendChild(chipsRow);

  /* Grid container */
  const gridWrap = document.createElement('div');
  gridWrap.className = 'no-scrollbar';
  gridWrap.style.cssText = 'flex:1;overflow-y:auto;padding:4px 20px 40px;';
  const grid = document.createElement('div');
  grid.className = 'episode-grid';
  gridWrap.appendChild(grid);
  el.appendChild(gridWrap);

  /* Render chips */
  function renderChips() {
    chipsRow.innerHTML = '';
    const visibleTags = activeCat === 'business' ? BUSINESS_TAGS
      : activeCat === 'creative' ? CREATIVE_TAGS.filter(t => SUGGESTED_TAGS.includes(t) || true)
      : SUGGESTED_TAGS;
    visibleTags.forEach(tag => {
      const isActive = activeTag === tag;
      const btn = document.createElement('button');
      btn.style.cssText = 'cursor:pointer;font-size:12px;padding:6px 12px;';
      btn.className = `pill ${isActive ? 'solid-green' : ''}`;
      btn.innerHTML = tag + (isActive ? (' ' + Icons.closeL) : '');
      btn.addEventListener('click', () => {
        activeTag = isActive ? null : tag;
        renderChips();
        renderGrid();
      });
      chipsRow.appendChild(btn);
    });
  }

  /* Render grid */
  function renderGrid() {
    const q = query.toLowerCase();
    let filtered = epsTagged;
    /* Category filter */
    if (activeCat === 'business') filtered = filtered.filter(e => e.tags.some(t => BUSINESS_TAGS.includes(t)));
    else if (activeCat === 'creative') filtered = filtered.filter(e => e.tags.some(t => CREATIVE_TAGS.includes(t)));
    if (activeTag) filtered = filtered.filter(e => e.tags.includes(activeTag));
    if (q) filtered = filtered.filter(e =>
      e.guest.toLowerCase().includes(q) ||
      e.title.toLowerCase().includes(q) ||
      e.cat.toLowerCase().includes(q) ||
      e.tags.some(t => t.toLowerCase().includes(q))
    );

    grid.innerHTML = '';
    if (filtered.length === 0) {
      gridWrap.innerHTML = '';
      const empty = document.createElement('div');
      empty.style.cssText = 'text-align:center;padding:40px 20px;color:var(--fg-muted);font-size:14px;';
      empty.textContent = 'No episodes match that.';
      gridWrap.appendChild(empty);
      return;
    }
    if (!gridWrap.contains(grid)) {
      gridWrap.innerHTML = '';
      gridWrap.appendChild(grid);
    }

    filtered.forEach(ep => {
      const card = document.createElement('button');
      card.style.cssText = 'text-align:left;display:flex;flex-direction:column;gap:8px;';

      const thumb = document.createElement('div');
      const epT = epThumb(ep);
      thumb.className = epT ? '' : thumbBg(ep.no);
      thumb.style.cssText = 'position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.05);';
      thumb.innerHTML = `
        ${epT
          ? `<img src="${epT}" alt="${ep.guest}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">`
          : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:900;font-size:60px;color:rgba(255,255,255,0.18);letter-spacing:-0.04em;">${initials(ep.guest)}</div>`
        }
        <div style="position:absolute;left:0;right:0;bottom:0;height:60%;background:linear-gradient(180deg,transparent,rgba(0,0,0,0.85));"></div>
        <div style="position:absolute;top:10px;left:10px;font-family:var(--display);font-weight:800;font-size:13px;color:var(--green);letter-spacing:0.05em;">EP ${String(ep.no).padStart(2,'0')}</div>
        <div style="position:absolute;left:12px;right:12px;bottom:10px;">
          <div style="font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-0.02em;line-height:1.05;color:#fff;">${ep.guest}</div>
          <div style="font-size:10.5px;color:rgba(255,255,255,0.7);margin-top:2px;">${ep.cat}</div>
        </div>
      `;
      const titleEl = document.createElement('div');
      titleEl.className = 'clamp-2';
      titleEl.style.cssText = 'font-size:12px;color:var(--fg-muted);line-height:1.35;padding:0 2px;';
      titleEl.textContent = ep.title;

      card.appendChild(thumb);
      card.appendChild(titleEl);
      card.addEventListener('click', () => navigate(Wiki, { epNo: ep.no }, 'right'));
      grid.appendChild(card);
    });
  }

  /* Search input */
  searchInput.addEventListener('input', () => {
    query = searchInput.value;
    clearBtn.style.display = query ? 'block' : 'none';
    renderGrid();
  });
  clearBtn.addEventListener('click', () => {
    query = '';
    searchInput.value = '';
    clearBtn.style.display = 'none';
    renderGrid();
  });

  /* Keyboard */
  function onKey(e) { if (e.key === 'Escape') navigate(Welcome, {}, 'left'); }
  document.addEventListener('keydown', onKey);

  /* Swipe right = back to home (matches the global back gesture) */
  const detachSwipe = attachSwipe(el, { onRight: () => navigate(Welcome, {}, 'left') });

  renderCatTabs();
  renderChips();
  renderGrid();

  return { el, cleanup: () => { document.removeEventListener('keydown', onKey); detachSwipe(); } };
}

/* ============================================================
   SCREEN: WIKI
   ============================================================ */
function Wiki({ epNo }) {
  const ep = EPISODES.find(e => e.no === epNo) || EPISODES[14];
  const w = WIKI_DATA[epNo] || defaultWiki(ep);
  const season = epNo > 11 ? 'S2' : 'S1';

  const el = document.createElement('div');
  el.className = 'screen screen-enter';
  el.style.padding = '0';

  el.appendChild(statusBarEl());
  el.appendChild(backBtnEl(() => navigate(Library, {}, 'left')));

  /* Scrollable content */
  const scroll = document.createElement('div');
  scroll.className = 'no-scrollbar';
  scroll.style.cssText = 'position:absolute;inset:0;overflow-y:auto;';

  /* Hero */
  const hero = document.createElement('div');
  hero.style.cssText = 'position:relative;height:460px;background:#0a0a0a;';

  /* Portrait — real image (BW fade on img) or gradient placeholder */
  const portrait = document.createElement('div');
  portrait.style.cssText = 'position:absolute;inset:0;';

  if (ep.portrait_url) {
    const img = document.createElement('img');
    img.src = ep.portrait_url;
    img.alt = ep.guest;
    img.className = 'bw-fade';
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;';
    portrait.appendChild(img);
  } else {
    /* Gradient placeholder */
    const placeholder = document.createElement('div');
    placeholder.className = 'bw-fade';
    placeholder.style.cssText = `
      position:absolute;inset:0;
      background:radial-gradient(ellipse 80% 60% at 50% 35%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.04) 40%, transparent 70%),
      linear-gradient(180deg, #2a2a2a 0%, #161616 100%);
    `;
    const heroInitials = document.createElement('div');
    heroInitials.style.cssText = 'position:absolute;top:110px;left:0;right:0;text-align:center;font-family:var(--display);font-weight:900;font-size:220px;color:rgba(255,255,255,0.22);letter-spacing:-0.05em;line-height:1;';
    heroInitials.textContent = initials(ep.guest);
    placeholder.appendChild(heroInitials);
    portrait.appendChild(placeholder);
  }

  /* Film grain overlay */
  const grain = document.createElement('div');
  grain.style.cssText = 'position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1.2px);background-size:3px 3px;mix-blend-mode:overlay;pointer-events:none;';
  portrait.appendChild(grain);
  hero.appendChild(portrait);

  /* Hero label */
  const heroLabel = document.createElement('div');
  heroLabel.style.cssText = 'position:absolute;bottom:16px;left:20px;right:20px;z-index:5;';
  heroLabel.innerHTML = `
    <div style="font-size:12px;color:var(--fg-dim);letter-spacing:0.18em;text-transform:uppercase;">Ep ${String(ep.no).padStart(2,'0')} · ${season}</div>
    <h1 style="margin:6px 0 8px;font-family:var(--display);font-weight:900;font-size:44px;letter-spacing:-0.035em;line-height:0.95;">${ep.guest}</h1>
    <span class="pill green">${ep.cat}</span>
  `;
  hero.appendChild(heroLabel);
  scroll.appendChild(hero);

  /* Two-col info block */
  const info = document.createElement('div');
  info.style.cssText = 'padding:28px 20px 0;display:grid;grid-template-columns:1.05fr 1fr;gap:22px;';

  /* Topics */
  const topicsCol = document.createElement('div');
  topicsCol.innerHTML = `<div style="font-size:11px;color:var(--fg-dim);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:10px;">what we talked about</div>`;
  const topicsList = document.createElement('ul');
  topicsList.style.cssText = 'list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px;';
  w.topics.forEach(t => {
    const li = document.createElement('li');
    li.style.cssText = 'display:flex;gap:8px;font-size:14px;line-height:1.35;color:var(--fg);';
    li.innerHTML = `<span style="color:var(--green);flex-shrink:0;font-weight:700;">·</span><span>${t}</span>`;
    topicsList.appendChild(li);
  });
  topicsCol.appendChild(topicsList);

  /* Quote */
  const quoteCol = document.createElement('div');
  quoteCol.innerHTML = `
    <div style="font-size:11px;color:var(--fg-dim);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:10px;">key quote</div>
    <div style="font-family:var(--display);font-style:italic;font-weight:500;font-size:16px;line-height:1.3;color:var(--fg);border-left:2px solid var(--green);padding-left:12px;letter-spacing:-0.01em;">${w.quote}</div>
  `;

  info.appendChild(topicsCol);
  info.appendChild(quoteCol);
  scroll.appendChild(info);

  /* Listen buttons */
  const listenRow = document.createElement('div');
  listenRow.style.cssText = 'padding:28px 20px 0;display:flex;gap:10px;';
  listenRow.innerHTML = `
    <a href="${ep.spotify_url || '#'}" ${ep.spotify_url ? 'target="_blank" rel="noopener"' : 'onclick="return false"'} style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;background:var(--green);color:#000;border-radius:999px;font-weight:700;font-size:14.5px;text-decoration:none;box-shadow:0 4px 14px rgba(29,185,84,0.25);${!ep.spotify_url ? 'opacity:0.5;' : ''}">${Icons.spotifyBlack} Listen on Spotify</a>
    <a href="${ep.youtube_url || '#'}" ${ep.youtube_url ? 'target="_blank" rel="noopener"' : 'onclick="return false"'} style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;background:transparent;color:var(--fg);border:1px solid var(--line-2);border-radius:999px;font-weight:700;font-size:14.5px;text-decoration:none;${!ep.youtube_url ? 'opacity:0.5;' : ''}">${Icons.youtube} YouTube</a>
  `;
  const epShareBtn = document.createElement('button');
  epShareBtn.setAttribute('aria-label', 'Share this episode');
  epShareBtn.style.cssText = 'flex:0 0 auto;width:52px;display:flex;align-items:center;justify-content:center;background:transparent;color:var(--fg);border:1px solid var(--line-2);border-radius:999px;cursor:pointer;';
  epShareBtn.innerHTML = Icons.share;
  epShareBtn.querySelector('svg')?.setAttribute('width', '20');
  epShareBtn.querySelector('svg')?.setAttribute('height', '20');
  epShareBtn.addEventListener('click', () => shareContent({
    title: `TigPods — ${ep.guest}`,
    text: `${ep.guest} on TigPods — ${ep.title}`,
    url: ep.youtube_url || ep.spotify_url || null,
  }));
  listenRow.appendChild(epShareBtn);
  scroll.appendChild(listenRow);

  /* Shorts strip */
  if (w.shorts.length > 0) {
    const shortsSection = document.createElement('div');
    shortsSection.style.cssText = 'padding:32px 0 0;';

    const shortsHeader = document.createElement('div');
    shortsHeader.style.cssText = 'padding:0 20px 14px;display:flex;justify-content:space-between;align-items:baseline;';
    shortsHeader.innerHTML = `
      <div style="font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-0.02em;">shorts from this episode</div>
      <div style="font-size:12px;color:var(--fg-dim);">${w.shorts.length}</div>
    `;
    shortsSection.appendChild(shortsHeader);

    const shortsRow = document.createElement('div');
    shortsRow.className = 'hrow no-scrollbar';
    shortsRow.style.cssText = 'padding-bottom:40px;';

    w.shorts.forEach(short => {
      const clipUrl = short.youtube_url || short.instagram_url || null;
      const isIG = !short.youtube_url && !!short.instagram_url;

      const cardBtn = document.createElement('button');
      cardBtn.style.cssText = 'width:130px;text-align:left;display:flex;flex-direction:column;gap:8px;' + (clipUrl ? 'cursor:pointer;' : 'opacity:0.5;cursor:default;');
      if (clipUrl) cardBtn.addEventListener('click', () => window.open(clipUrl, '_blank', 'noopener'));

      /* Random YouTube frame grab (frames 1-3) as the short's thumbnail;
         falls back to hqdefault, then to the initials placeholder behind it. */
      const shortVid = short.youtube_url ? ytVideoId(short.youtube_url) : null;
      const frame = ['1', '2', '3'][Math.floor(Math.random() * 3)];

      const thumb = document.createElement('div');
      thumb.className = thumbBg(ep.no);
      thumb.style.cssText = 'position:relative;width:130px;height:200px;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.05);';
      thumb.innerHTML = `
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:900;font-size:56px;color:rgba(255,255,255,0.16);">${initials(ep.guest)}</div>
        ${shortVid ? `<img src="https://img.youtube.com/vi/${shortVid}/${frame}.jpg" alt="" loading="lazy" onerror="if(this.dataset.fb){this.style.display='none'}else{this.dataset.fb=1;this.src='https://img.youtube.com/vi/${shortVid}/hqdefault.jpg'}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,0.62));pointer-events:none;"></div>` : ''}
        ${short.dur ? `<div style="position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.7);font-size:10px;padding:2px 6px;border-radius:4px;color:#fff;font-weight:600;">▶ ${short.dur}</div>` : ''}
        ${isIG ? `<div style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.65);border-radius:6px;padding:3px 5px;font-size:9px;font-weight:700;color:#E1306C;letter-spacing:0.03em;">IG</div>` : ''}
        ${shortVid ? '' : `<svg viewBox="0 0 130 30" style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);width:100%;height:30px;opacity:0.55;">
          <path d="M 0 15 Q 8 4 16 15 T 32 15 T 48 15 T 64 15 T 80 15 T 96 15 T 112 15 T 130 15" fill="none" stroke="var(--green)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>`}
      `;
      const title = document.createElement('div');
      title.className = 'clamp-2';
      title.style.cssText = 'font-size:12px;line-height:1.3;color:var(--fg);';
      title.textContent = short.title;

      cardBtn.appendChild(thumb);
      cardBtn.appendChild(title);
      shortsRow.appendChild(cardBtn);
    });

    shortsSection.appendChild(shortsRow);
    scroll.appendChild(shortsSection);
  }

  el.appendChild(scroll);

  /* Keyboard */
  function onKey(e) { if (e.key === 'Escape') navigate(Library, {}, 'left'); }
  document.addEventListener('keydown', onKey);

  /* Swipe right = back to the previous page (the library grid) */
  const detachSwipe = attachSwipe(el, { onRight: () => navigate(Library, {}, 'left') });

  return { el, cleanup: () => { document.removeEventListener('keydown', onKey); detachSwipe(); } };
}

/* ============================================================
   INIT
   ============================================================ */
(async () => {
  /* Loading spinner */
  root.innerHTML = `
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);">
      <div style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--green);animation:spin 0.75s linear infinite;"></div>
      <div style="font-size:12px;color:var(--fg-dim);letter-spacing:0.1em;text-transform:uppercase;">loading</div>
    </div>
  `;
  try {
    await loadData();
  } catch (e) {
    console.warn('Supabase fetch failed, site will be empty:', e);
  }
  navigate(Welcome);
})();
</script>
